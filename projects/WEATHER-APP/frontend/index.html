<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气查询</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>天气查询</h1>
    <div class="search-bar">
      <input type="text" id="city-input" placeholder="请输入城市名称" aria-label="城市名称">
      <button id="search-btn" type="button">搜索</button>
    </div>
    <div id="error-msg" class="error-msg" role="alert" style="display:none;"></div>
    <div id="weather-card" class="weather-card" style="display:none;">
      <h2 id="card-city"></h2>
      <div class="weather-info">
        <div class="info-item">
          <span class="label">温度</span>
          <span id="card-temp" class="value"></span>
        </div>
        <div class="info-item">
          <span class="label">天气</span>
          <span id="card-text" class="value"></span>
        </div>
        <div class="info-item">
          <span class="label">风向</span>
          <span id="card-wind" class="value"></span>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
